services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/loadflow.db
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./loadflow.db:/app/loadflow.db
      - ./uploads:/app/uploads
  web:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api
